ctxCssImport: true
inlineAllStyles: true
widthsContexts:
  - name: main
    max: 80rem
    prose: 50rem
fontStacksContexts:
  - name: main
    body:
      native: handwritten
    heading:
      native: old-style
    code:
      native: monospace-code
customFontsImport: []
typeScales: []
colors:
  - name: bleu
    value: '#2813ec'
  - name: rouge
    value: '#f00000'
  - name: jaune
    value: '#fdf81e'
  - name: noir
    value: '#000000'
  - name: blanc
    value: '#ffffff'
palettes:
  - name: RGB
    text: noir
    bg: blanc
    accent: bleu
    border: jaune
    text-decoration: rouge
    text--marker: bleu
    advancedDefaults: null
    selection:
      text--selection: blanc
      bg--selection: noir
    strong: null
    em: null
    mark: null
    b: null
    heading: null
    a: null
    button: null
    code: null
    svg: null
    scrollbar:
      track-color: rouge
      thumb-color: rouge
    advanced: null
styleContexts:
  - name: main
    value: ctx
